<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile</title>
<style>
  /* Basic Reset */
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; position: relative; }

  /* Top Bar & Logout Button */
  .top-bar { position: absolute; top: 20px; right: 20px; }
  .btn-logout { background-color: #dc3545; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: bold; }
  .btn-logout:hover { background-color: #c82333; }

  /* Modal/Popup Styles */
  .profile-modal { background-color: #ffffff; width: 500px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 30px; position: relative; }
  .close-icon { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 20px; cursor: pointer; color: #6c757d; }
  
  /* User Info Section */
  .user-header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
  .avatar { width: 50px; height: 50px; background-color: #e6f2ff; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #0056b3; font-size: 24px; }
  .user-details h2 { font-size: 20px; color: #333; margin-bottom: 5px; }
  .points-badge { display: inline-block; background-color: #f8f9fa; color: #0056b3; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; border: 1px solid #cce5ff; }

  /* Sections */
  .section-title { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 10px; }
  .security-section { margin-bottom: 30px; }
  .btn-outline { background-color: transparent; border: 1px solid #ced4da; color: #495057; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px; }
  .btn-outline:hover { background-color: #f8f9fa; }

  /* Orders Section */
  .orders-section { margin-bottom: 30px; min-height: 80px; }
  .error-text { color: #dc3545; font-size: 14px; }
  .order-item { background: #f8f9fa; padding: 10px; margin-bottom: 8px; border-radius: 5px; border-left: 3px solid #0056b3; font-size: 14px; }
  .loading-text { color: #6c757d; font-size: 14px; }

  /* Footer */
  .modal-footer { display: flex; justify-content: flex-end; }
  .btn-dark { background-color: #1a202c; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
  .btn-dark:hover { background-color: #2d3748; }
</style>
</head>
<body>

  <div class="top-bar">
    <button id="logoutBtn" class="btn-logout">Logout</button>
  </div>

  <div class="profile-modal">
    <button class="close-icon">&times;</button>

    <div class="user-header">
      <div class="avatar">&#128100;</div>
      <div class="user-details">
        <h2 id="userNameDisplay">Loading...</h2>
        <div class="points-badge">
          &#11088; Leaderboard Points: <span id="userPointsDisplay">0</span>
        </div>
      </div>
    </div>

    <div class="security-section">
      <div class="section-title">Account Security</div>
      <button class="btn-outline">&#128274; Change / Reset Password</button>
    </div>

    <div class="orders-section">
      <div class="section-title">My Recent Orders</div>
      <div id="ordersContainer">
        <span class="loading-text">Loading orders...</span>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-dark">Close Window</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // IMPORTANT: ඔබේ Firebase Config එක මෙතනට ඇතුලත් කරන්න
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // HTML Elements
    const logoutBtn = document.getElementById("logoutBtn");
    const ordersContainer = document.getElementById("ordersContainer");
    const userNameDisplay = document.getElementById("userNameDisplay");
    const userPointsDisplay = document.getElementById("userPointsDisplay");

    // 1. Log Out Function
    if (logoutBtn) {
      logoutBtn.addEventListener("click", () => {
        signOut(auth).then(() => {
          // Log out වුණාට පස්සේ login page එකට යවන්න
          window.location.href = "login.html"; 
        }).catch((error) => {
          console.error("Error signing out: ", error);
          alert("Logout වීමේදී ගැටළුවක් මතු විය.");
        });
      });
    }

    // 2. Auth State Check & Data Fetching
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        try {
          // User විස්තර ගැනීම (users collection එකෙන්)
          const userDocRef = doc(db, "users", user.uid);
          const userDoc = await getDoc(userDocRef);

          if (userDoc.exists()) {
            const userData = userDoc.data();
            // Full name එක නැත්නම් 'User' විදිහට පෙන්වයි
            if (userNameDisplay) userNameDisplay.innerText = userData.fullName || "User"; 
            if (userPointsDisplay) userPointsDisplay.innerText = userData.points || 0;
          }

          // 3. Orders Load කිරීම සහ JS හරහා Sort කිරීම (Index Error එක මගහැරීම)
          if (ordersContainer) {
            const ordersQuery = query(collection(db, "orders"), where("userId", "==", user.uid));
            const querySnapshot = await getDocs(ordersQuery);
            
            let ordersList = [];
            querySnapshot.forEach((doc) => {
              ordersList.push({ id: doc.id, ...doc.data() });
            });

            // දිනේ අනුව පිළිවෙළට හැදීම (Descending)
            ordersList.sort((a, b) => {
              let dateA = a.createdAt && a.createdAt.toMillis ? a.createdAt.toMillis() : new Date(a.createdAt || 0).getTime();
              let dateB = b.createdAt && b.createdAt.toMillis ? b.createdAt.toMillis() : new Date(b.createdAt || 0).getTime();
              return dateB - dateA; // අලුත්ම එක උඩින් එන්න
            });

            // UI එකට Orders දැමීම
            if (ordersList.length === 0) {
              ordersContainer.innerHTML = "<p class='loading-text'>No recent orders found.</p>";
            } else {
              let ordersHTML = "";
              ordersList.forEach(order => {
                let orderDate = new Date(order.createdAt?.toDate ? order.createdAt.toDate() : order.createdAt).toLocaleDateString();
                ordersHTML += `
                  <div class="order-item">
                    <strong>Order ID:</strong> ${order.id} <br>
                    <strong>Date:</strong> ${orderDate}
                  </div>
                `;
              });
              ordersContainer.innerHTML = ordersHTML;
            }
          }

        } catch (error) {
          console.error("Error fetching data:", error);
          // Error එකක් ආවොත් රතු පාටින් 'Failed to load orders' පෙන්වීම
          if (ordersContainer) {
            ordersContainer.innerHTML = `<span class="error-text">Failed to load orders.</span>`;
          }
        }
      } else {
        // ලොග් වෙලා නැත්නම් login page එකට redirect කිරීම
        window.location.href = "login.html";
      }
    });
  </script>
</body>
</html>
