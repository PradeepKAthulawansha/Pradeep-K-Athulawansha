<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awurudu Special | Pradeep K. Athulawansha</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* Base Styles & Resets */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', 'Noto Sans Sinhala', sans-serif; background-color: #fffaf0; color: #4a2511; overflow-x: hidden; position: relative; }

        /* Loader Animation */
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #ff9a44 0%, #fc6076 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 1s ease-in-out, visibility 1s; overflow: hidden;
        }

        #avurudu-video-bg {
            position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
            width: auto; height: auto; z-index: 1; transform: translateX(-50%) translateY(-50%); object-fit: cover;
        }

        .video-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 2;
        }

        .sun-container, .loader-text, #start-btn { position: relative; z-index: 3; }
        .sun-container { width: 120px; height: 120px; display: flex; justify-content: center; align-items: center; margin-bottom: 30px; }
        .sun { width: 80px; height: 80px; background: #ffeb3b; border-radius: 50%; box-shadow: 0 0 40px #ffeb3b, 0 0 80px #ff9800; animation: pulse 1.5s infinite alternate; z-index: 2; }
        .rays { position: absolute; width: 100%; height: 100%; animation: spin 8s linear infinite; }
        .rays::before, .rays::after { content: ''; position: absolute; top: 0; left: 50%; width: 10px; height: 100%; background: rgba(255, 235, 59, 0.6); transform: translateX(-50%); border-radius: 50%; }
        .rays::after { transform: translateX(-50%) rotate(90deg); }
        .rays-2 { position: absolute; width: 100%; height: 100%; animation: spin 8s linear infinite reverse; }
        .rays-2::before, .rays-2::after { content: ''; position: absolute; top: 0; left: 50%; width: 10px; height: 100%; background: rgba(255, 152, 0, 0.5); transform: translateX(-50%) rotate(45deg); border-radius: 50%; }
        .rays-2::after { transform: translateX(-50%) rotate(135deg); }

        .loader-text {
            color: #ffffff; font-size: 2rem; font-weight: 700; text-align: center;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8); animation: bounce 2s infinite ease-in-out; padding: 0 20px; margin-bottom: 30px;
        }

        /* Button Styling */
        .awurudu-btn {
            position: relative; display: inline-block; padding: 20px 40px; font-size: 1.5rem; font-weight: 700;
            font-family: 'Noto Sans Sinhala', sans-serif; color: #ffffff; text-decoration: none;
            background: linear-gradient(45deg, #e65100, #ffb300); border-radius: 50px;
            box-shadow: 0 10px 20px rgba(230, 81, 0, 0.3); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden; border: 3px solid #ffca28; text-align: center; min-width: 250px; z-index: 30; cursor: pointer;
        }
        .awurudu-btn:hover:not(.disabled-btn) { transform: translateY(-8px) scale(1.05); box-shadow: 0 15px 25px rgba(230, 81, 0, 0.5); background: linear-gradient(45deg, #ffb300, #e65100); border-color: #ffffff; }
        .awurudu-btn:not(.disabled-btn)::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); animation: shine 3s infinite;
        }
        .disabled-btn { background: #bdbdbd !important; border-color: #9e9e9e !important; color: #fafafa !important; box-shadow: none !important; cursor: not-allowed !important; pointer-events: none !important; opacity: 0.8; }

        /* Main Content Styles */
        #main-content { opacity: 0; transform: translateY(30px); transition: opacity 1.2s ease-out, transform 1.2s ease-out; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 10; }
        .content-box { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); padding: 50px; border-radius: 30px; border: 4px solid #ff9800; box-shadow: 0 15px 35px rgba(230, 81, 0, 0.15), inset 0 0 20px rgba(255, 152, 0, 0.2); text-align: center; max-width: 900px; width: 100%; position: relative; z-index: 20; }
        .header-section { margin-bottom: 30px; }
        .brand-name { font-size: 1.5rem; color: #e65100; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .main-title { font-size: 3rem; color: #bf360c; font-weight: 800; text-shadow: 2px 2px 0px rgba(255, 202, 40, 0.5); margin-bottom: 15px; }
        .sub-title { font-size: 1.2rem; color: #5d4037; font-weight: bold; }

        /* Countdown */
        #countdown-wrapper { background: rgba(255, 235, 59, 0.2); border: 2px dashed #ff9800; padding: 20px; border-radius: 15px; margin-bottom: 30px; display: inline-block; width: 100%; max-width: 600px; }
        .countdown-main-msg { font-size: 1.1rem; color: #d84315; font-weight: 700; margin-bottom: 10px; }
        .countdown-sec-msg { font-size: 1.2rem; color: #4a2511; font-weight: 600; }
        #countdown-timer { color: #bf360c; font-size: 1.5rem; font-weight: 800; font-family: 'Poppins', sans-serif; background: #fff; padding: 5px 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; margin-left: 10px; }

        .button-container { display: flex; gap: 30px; justify-content: center; align-items: center; flex-wrap: wrap; width: 100%; }

        /* Floating Food */
        .festival-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 1; pointer-events: none; }
        .floating-item { position: absolute; font-size: 2.5rem; bottom: -50px; opacity: 0; animation: floatUp linear infinite; }
        .item-1 { left: 10%; animation-duration: 12s; animation-delay: 0s; font-size: 3rem; }
        .item-2 { left: 25%; animation-duration: 15s; animation-delay: 2s; font-size: 2rem; }
        .item-3 { left: 40%; animation-duration: 10s; animation-delay: 4s; font-size: 2.5rem; }
        .item-4 { left: 60%; animation-duration: 14s; animation-delay: 1s; font-size: 3.5rem; }
        .item-5 { left: 75%; animation-duration: 11s; animation-delay: 5s; font-size: 2rem; }
        .item-6 { left: 90%; animation-duration: 16s; animation-delay: 3s; font-size: 2.8rem; }
        .item-7 { left: 50%; animation-duration: 13s; animation-delay: 7s; font-size: 2.2rem; }
        .item-8 { left: 15%; animation-duration: 14s; animation-delay: 8s; font-size: 2.6rem; }

        @keyframes pulse { 0% { transform: scale(0.9); box-shadow: 0 0 20px #ffeb3b; } 100% { transform: scale(1.1); box-shadow: 0 0 60px #ffeb3b, 0 0 100px #ff9800; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes shine { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }
        @keyframes floatUp { 0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { transform: translateY(-110vh) rotate(360deg) scale(1.2); opacity: 0; } }

        @media screen and (max-width: 768px) {
            .content-box { padding: 30px 15px; border-radius: 20px; }
            .main-title { font-size: 2.2rem; }
            .brand-name { font-size: 1.2rem; }
            .button-container { flex-direction: column; gap: 20px; }
            .awurudu-btn { width: 100%; font-size: 1.3rem; padding: 15px 20px; }
            .loader-text { font-size: 1.5rem; }
            .floating-item { font-size: 1.8rem; }
            .countdown-main-msg { font-size: 1rem; }
            .countdown-sec-msg { font-size: 1.1rem; }
            #countdown-timer { font-size: 1.2rem; display: block; margin: 10px auto 0; width: fit-content; }
        }
    </style>
</head>
<body>

    <audio id="avurudu-audio" src="MeAwuruduKale.mp3" loop autoplay preload="auto"></audio>

    <div id="loader-wrapper">
        
        <video id="avurudu-video-bg" autoplay loop muted playsinline>
            <source src="Awurudu video.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>

        <div class="sun-container">
            <div class="rays"></div>
            <div class="rays-2"></div>
            <div class="sun"></div>
        </div>
        <h1 class="loader-text">සුභ සිංහල හා හින්දු අලුත් අවුරුද්දක් වේවා!</h1>
        
        <button id="start-btn" class="awurudu-btn" style="padding: 10px 40px; font-size: 1.2rem; min-width: auto; display: none;">
            ඇතුල් වන්න (Enter)
        </button>
    </div>

    <div class="festival-bg" id="bg-animations" style="display: none;">
        <div class="floating-item item-1">🍚</div>
        <div class="floating-item item-2">🍌</div>
        <div class="floating-item item-3">🥨</div>
        <div class="floating-item item-4">🍯</div>
        <div class="floating-item item-5">🥟</div>
        <div class="floating-item item-6">🍚</div>
        <div class="floating-item item-7">🥨</div>
        <div class="floating-item item-8">🍌</div>
        <div class="floating-item item-1">🍚</div>
        <div class="floating-item item-2">🍌</div>
        <div class="floating-item item-3">🥨</div>
        <div class="floating-item item-4">🍯</div>
        <div class="floating-item item-5">🥟</div>
        <div class="floating-item item-6">🍚</div>
        <div class="floating-item item-7">🥨</div>
        <div class="floating-item item-8">🍌</div>
    </div>

    <div id="main-content">
        <div class="content-box">
            <div class="header-section">
                <div class="brand-name">Pradeep K. Athulawansha</div>
                <h1 class="main-title">අලුත් අවුරුද්ද අපිත් එක්ක පටන් ගමු</h1>
                <p class="sub-title">කරුණාකර පහතින් ඔබගේ අංශය තෝරන්න</p>
            </div>

            <div id="countdown-wrapper" style="display: none;">
                <p class="countdown-main-msg">වැඩ ඇල්ලීමේ නැකතට විනාඩි 06කට පෙර මෙම button එක Unlock වේ.</p>
                <p class="countdown-sec-msg">Unlock වීමට තව: <span id="countdown-timer"></span></p>
            </div>

            <div class="button-container">
                <a href="https://form.jotform.com/261021101672440" target="_blank" class="awurudu-btn">
                    10/11 වැඩ ඇල්ලීම
                </a>

                <a href="https://form.jotform.com/261011868900453" target="_blank" class="awurudu-btn">
                    12/13 වැඩ ඇල්ලීම
                </a>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            
            const loader = document.getElementById('loader-wrapper');
            const mainContent = document.getElementById('main-content');
            const bgAnimations = document.getElementById('bg-animations');
            const audio = document.getElementById('avurudu-audio');
            const startBtn = document.getElementById('start-btn');
            
            // Reusable function to transition out of the loading screen
            function startExperience() {
                loader.style.opacity = '0';
                
                setTimeout(function() {
                    loader.style.visibility = 'hidden';
                    
                    const bgVideo = document.getElementById('avurudu-video-bg');
                    if(bgVideo) { bgVideo.pause(); }
                    
                    bgAnimations.style.display = 'block';
                    mainContent.style.opacity = '1';
                    mainContent.style.transform = 'translateY(0)';
                }, 1000); 
            }

            // ==========================================
            // SMART AUTOPLAY LOGIC
            // ==========================================
            let playPromise = audio.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    // SUCCESS! The browser allowed autoplay.
                    // Keep the loader visible for 3.5 seconds to enjoy the video, then automatically fade to content.
                    setTimeout(startExperience, 3500);
                })
                .catch(error => {
                    // FAILED! The browser blocked autoplay.
                    // We MUST show the start button so the user isn't stuck.
                    console.log("Browser blocked autoplay. Showing fallback Enter button.");
                    startBtn.style.display = 'inline-block';
                });
            }

            // Fallback click event for when autoplay was blocked
            startBtn.addEventListener('click', function() {
                audio.play().catch(e => console.log(e));
                startBtn.style.opacity = '0';
                setTimeout(startExperience, 500); // Transition out faster if they clicked
            });


            // Audio Lifecycle fixes
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    audio.pause();
                } else if (loader.style.visibility === 'hidden') {
                    audio.play().catch(e => console.log(e));
                }
            });

            window.addEventListener('beforeunload', function() {
                audio.pause();
                audio.currentTime = 0;
            });
            
            window.addEventListener('pagehide', function() {
                audio.pause();
            });

            // Countdown Logic Setup
            const targetDate = new Date("April 14, 2026 12:00:00").getTime();
            const countdownWrapper = document.getElementById("countdown-wrapper");
            const countdownTimerElement = document.getElementById("countdown-timer");
            const actionBtns = document.querySelectorAll(".awurudu-btn");

            const initialNow = new Date().getTime();
            if (targetDate - initialNow > 0) {
                countdownWrapper.style.display = "inline-block";
                actionBtns.forEach(btn => {
                    if (btn.id !== "start-btn") { 
                        btn.setAttribute("data-href", btn.getAttribute("href"));
                        btn.removeAttribute("href");
                        btn.classList.add("disabled-btn");
                    }
                });
            }

            const timerInterval = setInterval(function() {
                const now = new Date().getTime();
                const distance = targetDate - now;

                if (distance > 0) {
                    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                    let timeString = "";
                    if (days > 0) timeString += `${days}d `;
                    timeString += `${hours}h ${minutes}m ${seconds}s`;
                    countdownTimerElement.innerText = timeString;

                } else {
                    clearInterval(timerInterval);
                    countdownWrapper.style.display = "none";
                    
                    actionBtns.forEach(btn => {
                        if(btn.hasAttribute("data-href")) {
                            btn.setAttribute("href", btn.getAttribute("data-href"));
                            btn.removeAttribute("data-href");
                        }
                        btn.classList.remove("disabled-btn");
                    });
                }
            }, 1000);
        });
    </script>

</body>
</html>
