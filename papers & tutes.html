<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers & Tutes | bizmind.lk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script type="text/javascript" src="https://www.payhere.lk/lib/payhere.js"></script>
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh;}
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .auth-glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .auth-input { width: 100%; padding: 12px 20px; border-radius: 12px; border: 1px solid #e2e8f0; background: rgba(255,255,255,0.9); outline: none; transition: all 0.3s; margin-bottom: 12px; font-size: 15px; }
        .auth-btn { width: 100%; padding: 14px; border-radius: 12px; background: linear-gradient(to right, #2563eb, #9333ea); color: white; font-weight: 600; transition: all 0.3s; margin-top: 10px; }
        .modal-backdrop { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(6px); }
    </style>
</head>
<body class="relative text-slate-800">

    <div id="toast-container" class="fixed top-5 right-5 z-[9999] space-y-3 pointer-events-none"></div>

    <main class="flex-grow pt-32 pb-12">
        </main>

    <div id="authModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center modal-backdrop px-4">
        </div>

    <script type="module">
        // ... (Imports) ...

        // Error Handler function to map Firebase codes to User Friendly messages
        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-xl border text-sm font-medium flex items-center gap-2 transform transition-all duration-300 translate-y-2 opacity-0 pointer-events-auto max-w-sm bg-white min-w-[300px]`;
            if (type === 'success') {
                toast.classList.add('border-green-200', 'text-green-800', 'bg-green-50/95');
                toast.innerHTML = `<i class="ph-fill ph-check-circle text-green-500 text-lg"></i> <span>${message}</span>`;
            } else {
                toast.classList.add('border-red-200', 'text-red-800', 'bg-red-50/95');
                toast.innerHTML = `<i class="ph-fill ph-warning-circle text-red-500 text-lg"></i> <span>${message}</span>`;
            }
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-y-2', 'opacity-0'); }, 10);
            setTimeout(() => { toast.classList.add('opacity-0', '-translate-y-2'); setTimeout(() => toast.remove(), 300); }, 4500);
        }

        function getFriendlyErrorMessage(code) {
            switch(code) {
                case 'auth/email-already-in-use': return "මෙම ඊමේල් ලිපිනය දැනටමත් ලියාපදිංචි වී ඇත.";
                case 'auth/invalid-credential': return "ඊමේල් හෝ මුරපදය වැරදියි.";
                case 'auth/network-request-failed': return "අන්තර්ජාල සම්බන්ධතාවය පරීක්ෂා කරන්න.";
                case 'auth/weak-password': return "මුරපදය ඉතා දුර්වලයි.";
                default: return "යම් දෝෂයක් සිදුවිය: " + code;
            }
        }

        // Example Usage in Register:
        window.registerUser = async function() {
            // ... (Get fields) ...
            try {
                // ... (Create User) ...
            } catch (error) {
                window.showToast(getFriendlyErrorMessage(error.code), "error");
                btn.disabled = false; btn.innerText = "Create Account";
            }
        }
    </script>
</body>
</html>
