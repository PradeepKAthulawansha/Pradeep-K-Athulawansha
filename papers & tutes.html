<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers & Tutes | bizmind.lk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh;}
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .auth-glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .auth-input { width: 100%; padding: 12px 20px; border-radius: 12px; border: 1px solid #e2e8f0; background: rgba(255,255,255,0.9); outline: none; margin-bottom: 12px; font-size: 15px; }
        .auth-btn { width: 100%; padding: 14px; border-radius: 12px; background: linear-gradient(to right, #2563eb, #9333ea); color: white; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .auth-btn:disabled { background: #cbd5e1; }
        .modal-backdrop { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(6px); }
        .pulse-text { animation: pulse-text 2s infinite; }
        @keyframes pulse-text { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="relative text-slate-800">

    <div id="toast-container" class="fixed top-5 right-5 z-[9999] space-y-3 pointer-events-none"></div>

    <header class="fixed w-full top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 py-3">
        <div class="container mx-auto px-6 md:px-12 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600">
                <i class="ph ph-book-open text-blue-600"></i> bizmind.lk
            </a>
            <nav class="hidden md:flex gap-8 items-center font-medium">
                <a href="index.html" class="hover:text-blue-600">Home</a>
                <a href="about us.html" class="hover:text-blue-600">About Us</a>
                <a href="papers-tutes.html" class="text-blue-600">Papers & Tutes</a>
                <a href="contact us.html" class="hover:text-blue-600">Contact</a>
            </nav>
            <button id="navLoginBtn" onclick="window.openAuthModal()" class="px-6 py-2 rounded-full bg-slate-900 text-white font-medium hover:bg-slate-800">Login / Register</button>
        </div>
    </header>

    <main class="flex-grow pt-32 pb-12">
        <div class="container mx-auto px-6 md:px-12 min-h-[70vh]">
            <div id="userDashboardBar" class="hidden glass-panel p-6 rounded-2xl mb-10 flex justify-between items-center">
                <h2 id="welcomeMsg" class="font-bold text-lg">Welcome!</h2>
                <button onclick="window.logoutUser()" class="text-red-500 text-sm border px-4 py-1 rounded-full">Log Out</button>
            </div>

            <div class="flex flex-wrap justify-center gap-4 mb-12">
                <button onclick="window.filterItems('Grade 10 Tutes', this)" class="tab-btn px-8 py-3 rounded-full bg-slate-900 text-white shadow-lg">Grade 10 Tutes</button>
                <button onclick="window.filterItems('Grade 11 Tutes', this)" class="tab-btn px-8 py-3 rounded-full glass-panel text-slate-600">Grade 11 Tutes</button>
                <button onclick="window.filterItems('Grade 12 Tutes', this)" class="tab-btn px-8 py-3 rounded-full glass-panel text-slate-600">Grade 12 Tutes</button>
                <button onclick="window.filterItems('Grade 13 Tutes', this)" class="tab-btn px-8 py-3 rounded-full glass-panel text-slate-600">Grade 13 Tutes</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="resourceGrid">
                <div class="col-span-full text-center py-10">Loading...</div>
            </div>
        </div>
    </main>

    <div id="shippingModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center modal-backdrop px-4">
        <div class="bg-white w-full max-w-lg p-8 rounded-3xl shadow-2xl max-h-[90vh] overflow-y-auto">
            <button onclick="window.closePaymentModal()" class="absolute top-5 right-5 text-2xl"><i class="ph ph-x"></i></button>
            
            <div id="payMethodSelection">
                <h3 class="text-xl font-bold text-center mb-6">Select Payment Method</h3>
                <div class="space-y-4">
                    <div onclick="window.selectPaymentMethod('online')" class="border-2 p-4 rounded-xl cursor-pointer hover:border-blue-500">
                        <h4 class="font-bold">Online Bank Transfer</h4>
                        <p class="text-xs">20 Minutes time limit</p>
                    </div>
                    <div onclick="window.selectPaymentMethod('manual')" class="border-2 p-4 rounded-xl cursor-pointer hover:border-orange-500">
                        <h4 class="font-bold">Manual Bank Deposit</h4>
                        <p class="text-xs">24 Hours time limit</p>
                    </div>
                </div>
            </div>

            <div id="payCheckoutForm" class="hidden">
                <div class="text-center mb-4">
                    <p id="countdownDisplay" class="text-3xl font-bold font-mono pulse-text text-red-500">00:00</p>
                </div>
                <div class="bg-slate-100 p-4 rounded-xl mb-4 text-sm">
                    <p><strong>Bank:</strong> BOC Kandy | <strong>Acc:</strong> 1234567890</p>
                    <p class="font-bold mt-2 text-blue-600">Amount: <span id="payAmountDisplay"></span></p>
                </div>
                <input type="file" id="paymentSlip" class="w-full p-2 border rounded-xl" accept="image/*,.pdf">
                <button id="payBtn" onclick="window.initiatePayment()" class="w-full py-4 mt-4 bg-blue-600 text-white font-bold rounded-xl">Submit Order</button>
                <button id="extendTimeBtn" onclick="window.extendTime()" class="w-full py-2 mt-2 text-sm text-orange-600 font-bold hidden">Extend Time (+24h)</button>
            </div>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center modal-backdrop px-4">
        <div class="w-full max-w-md relative bg-white p-8 rounded-3xl">
            <h2 class="text-2xl font-bold mb-4">Account</h2>
            <input type="email" id="loginEmail" class="auth-input" placeholder="Email">
            <input type="password" id="loginPassword" class="auth-input" placeholder="Password">
            <button class="auth-btn" onclick="window.loginUser()">Log In</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-storage.js";

        // CONFIG (Replace with your own)
        const firebaseConfig = {
            apiKey: "AIzaSyAcmeOtsIU6Ka_Vh5W1IFwm8CjQPUuu34s",
            authDomain: "pradeep-k-athulawansha.firebaseapp.com",
            projectId: "pradeep-k-athulawansha",
            storageBucket: "pradeep-k-athulawansha.firebasestorage.app",
            messagingSenderId: "950027835210",
            appId: "1:950027835210:web:a2894cd14833dc101bd3b3"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); const db = getFirestore(app); const storage = getStorage(app);

        let dbResources = [], currentPurchaseTute = null, countdownInterval;

        // Init
        async function initPage() {
            const q = query(collection(db, "resources"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            dbResources = [];
            snap.forEach(d => dbResources.push({id: d.id, ...d.data()}));
            window.renderItems('Grade 10 Tutes');
        }
        initPage();

        window.renderItems = (cat) => {
            const grid = document.getElementById('resourceGrid');
            const items = dbResources.filter(i => i.category === cat);
            grid.innerHTML = items.length ? '' : '<p class="col-span-full text-center">No items.</p>';
            items.forEach(item => {
                grid.innerHTML += `
                    <div class="glass-panel p-6 rounded-2xl">
                        <h3 class="font-bold">${item.title}</h3>
                        <p class="text-sm my-4">${item.desc}</p>
                        <button onclick="window.handleAccess('${item.id}', '${item.driveLink}', '${item.price}', '${item.title}')" class="w-full py-2 bg-blue-600 text-white rounded-lg">Access</button>
                    </div>`;
            });
        }

        window.filterItems = (cat, btn) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn px-8 py-3 rounded-full glass-panel text-slate-600");
            btn.className = "tab-btn px-8 py-3 rounded-full bg-slate-900 text-white shadow-lg";
            window.renderItems(cat);
        }

        window.handleAccess = (id, link, price, title) => {
            if(!auth.currentUser) { window.openAuthModal(); return; }
            currentPurchaseTute = {id, title, price};
            document.getElementById('shippingModal').classList.remove('hidden');
        }

        window.selectPaymentMethod = (method) => {
            const now = new Date().getTime();
            let expiry = (method === 'online') ? now + (20 * 60 * 1000) : now + (24 * 60 * 60 * 1000);
            localStorage.setItem(`pay_expiry_${currentPurchaseTute.id}`, expiry);
            document.getElementById('payMethodSelection').classList.add('hidden');
            document.getElementById('payCheckoutForm').classList.remove('hidden');
            if(method === 'manual') document.getElementById('extendTimeBtn').classList.remove('hidden');
            startTimer(expiry, method);
        }

        function startTimer(expiry, method) {
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                const dist = expiry - new Date().getTime();
                if(dist < 0) { clearInterval(countdownInterval); alert("Expired!"); return; }
                const m = Math.floor((dist % (1000*60*60))/(1000*60));
                const s = Math.floor((dist % (1000*60))/1000);
                document.getElementById('countdownDisplay').innerText = `${m}:${s}`;
            }, 1000);
        }

        window.initiatePayment = async () => {
            const slip = document.getElementById('paymentSlip').files[0];
            if(!slip) { alert("Please upload slip"); return; }
            const btn = document.getElementById('payBtn'); btn.disabled = true; btn.innerText = "Submitting...";
            try {
                const orderId = "TUTE_" + Date.now();
                const refS = ref(storage, 'slips/' + orderId);
                const upload = await uploadBytesResumable(refS, slip);
                const url = await getDownloadURL(upload.ref);
                await setDoc(doc(db, "orders", orderId), { 
                    studentId: auth.currentUser.uid, tuteId: currentPurchaseTute.id, tuteTitle: currentPurchaseTute.title, 
                    amount: currentPurchaseTute.price, slipUrl: url, status: 'Pending Verification', date: new Date() 
                });
                alert("Submitted!");
                document.getElementById('shippingModal').classList.add('hidden');
            } catch(e) { alert("Error"); }
            finally { btn.disabled = false; }
        }

        window.openAuthModal = () => document.getElementById('authModal').classList.remove('hidden');
        window.closeAuthModal = () => document.getElementById('authModal').classList.add('hidden');
        window.closePaymentModal = () => { document.getElementById('shippingModal').classList.add('hidden'); clearInterval(countdownInterval); }
        window.loginUser = async () => { /* Add logic */ }
        window.registerUser = async () => { /* Add logic */ }
        window.logoutUser = async () => { await signOut(auth); location.reload(); }
        window.openProfile = () => { /* Add logic */ }
        window.closeProfile = () => { /* Add logic */ }
    </script>
</body>
</html>
