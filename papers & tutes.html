<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers & Tutes | Business Studies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script type="text/javascript" src="https://www.payhere.lk/lib/payhere.js"></script>
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .auth-glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
        .auth-input { width: 100%; padding: 12px 20px; border-radius: 12px; border: 1px solid #e2e8f0; background: rgba(255,255,255,0.9); outline: none; transition: all 0.3s; margin-bottom: 12px; font-size: 15px; }
        .auth-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .auth-btn { width: 100%; padding: 14px; border-radius: 12px; background: linear-gradient(to right, #2563eb, #9333ea); color: white; font-weight: 600; transition: all 0.3s; margin-top: 10px; }
        .link-text { color: #3b82f6; cursor: pointer; font-size: 14px; transition: color 0.3s; }
        .link-text:hover { color: #1d4ed8; text-decoration: underline; }
    </style>
</head>
<body class="relative min-h-screen flex flex-col text-slate-800">

    <header id="navbar" class="fixed w-full top-0 z-50 transition-all duration-300 bg-white/80 backdrop-blur-md border-b border-slate-200 py-3">
        <div class="container mx-auto px-6 md:px-12 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600">
                <i class="ph ph-book-open text-blue-600"></i> Business Studies
            </a>
            <nav class="hidden md:flex gap-8 items-center">
                <a href="index.html" class="font-medium text-slate-700 hover:text-blue-600 transition-colors">Home</a>
                <a href="papers & tutes.html" class="font-medium text-blue-600 relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-full after:h-0.5 after:bg-blue-600">Papers & Tutes</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow pt-32 pb-12">
        <div class="container mx-auto px-6 md:px-12 min-h-[70vh]">
            
            <div id="loadingAuth" class="flex justify-center items-center h-64">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-600"></div>
            </div>

            <div id="authContainer" class="max-w-md mx-auto hidden mt-10">
                <div id="loginSection" class="auth-glass p-10 rounded-3xl text-center">
                    <h2 class="text-2xl font-bold mb-1 text-slate-800">Student Login</h2>
                    <input type="email" id="loginEmail" class="auth-input mt-6" placeholder="Email Address">
                    <input type="password" id="loginPassword" class="auth-input" placeholder="Password">
                    <button id="loginBtn" class="auth-btn mt-2" onclick="window.loginUser()">Log In to Portal</button>
                    <div class="flex justify-between mt-6 px-2">
                        <span class="link-text font-semibold" onclick="window.toggleAuthView('signupSection')">Create Account</span>
                    </div>
                </div>

                <div id="signupSection" class="auth-glass p-10 rounded-3xl text-center hidden">
                    <h2 class="text-2xl font-bold mb-6 text-slate-800">Register Now</h2>
                    <input type="text" id="regName" class="auth-input" placeholder="Full Name">
                    <input type="email" id="regEmail" class="auth-input" placeholder="Email Address">
                    <input type="tel" id="regPhone" class="auth-input" placeholder="Phone No">
                    <input type="password" id="regPassword" class="auth-input" placeholder="Create Password">
                    <button id="signupBtn" class="auth-btn mt-2" onclick="window.registerUser()">Create Account</button>
                    <div class="mt-5"><span class="link-text font-semibold" onclick="window.toggleAuthView('loginSection')">Back to Log In</span></div>
                </div>
            </div>

            <div id="dashboardContainer" class="hidden">
                <div class="glass-panel p-6 rounded-2xl mb-6 flex justify-between items-center">
                    <h2 id="welcomeMsg" class="text-xl font-bold text-slate-800">Welcome!</h2>
                    <button onclick="window.logoutUser()" class="px-6 py-2 rounded-full border-2 border-red-100 text-red-500 hover:bg-red-50 font-medium">Log Out</button>
                </div>

                <div class="flex flex-wrap justify-center gap-4 mb-12" id="tabContainer">
                    <button onclick="filterItems('Grade 10 Tutes', this)" class="tab-btn px-8 py-3 rounded-full font-medium transition-all duration-300 bg-slate-900 text-white shadow-lg scale-105">Grade 10 Tutes</button>
                    <button onclick="filterItems('Grade 11 Tutes', this)" class="tab-btn px-8 py-3 rounded-full font-medium transition-all duration-300 glass-panel text-slate-600 hover:bg-white/90">Grade 11 Tutes</button>
                    <button onclick="filterItems('Grade 12 Tutes', this)" class="tab-btn px-8 py-3 rounded-full font-medium transition-all duration-300 glass-panel text-slate-600 hover:bg-white/90">Grade 12 Tutes</button>
                    <button onclick="filterItems('Grade 13 Tutes', this)" class="tab-btn px-8 py-3 rounded-full font-medium transition-all duration-300 glass-panel text-slate-600 hover:bg-white/90">Grade 13 Tutes</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="resourceGrid"></div>
            </div>
        </div>
    </main>

    <div id="shippingModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-slate-900/60 backdrop-blur-sm px-4">
        <div class="bg-white w-full max-w-lg p-8 rounded-3xl relative shadow-2xl max-h-[90vh] overflow-y-auto">
            <button onclick="document.getElementById('shippingModal').classList.add('hidden')" class="absolute top-5 right-5 text-slate-400 hover:text-slate-800 text-2xl"><i class="ph ph-x"></i></button>
            
            <div class="w-16 h-16 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-3xl mb-4 mx-auto"><i class="ph-fill ph-truck"></i></div>
            <h3 class="text-2xl font-bold text-slate-800 mb-2 text-center">Shipping Details</h3>
            
            <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-xl mb-6">
                <p class="text-sm text-blue-800 font-medium">මෙම ගෙවීම සිදු කල පසු හැකි ඉක්මනින් අදාල tute එක ඔබ වෙත courier මාර්ගයෙන් ලැබෙන අතර, එතෙක් සහා Life time භාවිතය සදහා Tute එකට අදාල PDF එක ඔබගේ profile එක තුළ Unlock වනු ඇත.</p>
            </div>

            <div class="space-y-4">
                <input type="text" id="shipName" class="w-full p-3 border rounded-xl" placeholder="Full Name (Delivery Name)">
                <textarea id="shipAddress" rows="2" class="w-full p-3 border rounded-xl" placeholder="Full Delivery Address"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="shipPostal" class="w-full p-3 border rounded-xl" placeholder="Postal Code">
                    <input type="tel" id="shipPhone1" class="w-full p-3 border rounded-xl" placeholder="Mobile Number 1">
                </div>
                <input type="tel" id="shipPhone2" class="w-full p-3 border rounded-xl" placeholder="Mobile Number 2 (Optional)">
                
                <button id="payBtn" onclick="window.initiatePayment()" class="w-full py-4 rounded-xl bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold text-lg hover:shadow-lg mt-4 flex justify-center items-center gap-2">
                    Pay <span id="payAmountDisplay"></span> via PayHere
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, getDocs, collection, query, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAcmeOtsIU6Ka_Vh5W1IFwm8CjQPUuu34s",
            authDomain: "pradeep-k-athulawansha.firebaseapp.com",
            projectId: "pradeep-k-athulawansha",
            storageBucket: "pradeep-k-athulawansha.firebasestorage.app",
            messagingSenderId: "950027835210",
            appId: "1:950027835210:web:a2894cd14833dc101bd3b3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let dbResources = [];
        let currentUser = null;
        let currentUserData = null; 
        let currentUserUnlockedTutes = [];
        let currentActiveCategory = 'Grade 10 Tutes'; // Default Tab changed

        // PAYMENT VARIABLES
        let currentPurchaseTute = null; // Store tute details when paying

        async function fetchResourcesFromDB() {
            try {
                const q = query(collection(db, "resources"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q); dbResources = [];
                querySnapshot.forEach((doc) => { dbResources.push(doc.data()); });
            } catch (error) { console.error(error); }
        }

        onAuthStateChanged(auth, async (user) => {
            document.getElementById('loadingAuth').classList.add('hidden'); 
            if (user && user.email !== "admin@pradeepk.com") {
                currentUser = user;
                document.getElementById('authContainer').classList.add('hidden');
                document.getElementById('dashboardContainer').classList.remove('hidden');
                
                try {
                    const docSnap = await getDoc(doc(db, "students", user.uid));
                    if (docSnap.exists()) {
                        currentUserData = docSnap.data(); 
                        document.getElementById('welcomeMsg').innerText = "Welcome back, " + currentUserData.fullName + "!";
                        if(currentUserData.unlockedTutes) { currentUserUnlockedTutes = currentUserData.unlockedTutes; }
                    }
                } catch (e) { console.log(e); }
                
                await fetchResourcesFromDB();
                window.renderItems(currentActiveCategory);
                
            } else {
                currentUser = null; currentUserData = null; currentUserUnlockedTutes = [];
                document.getElementById('dashboardContainer').classList.add('hidden');
                document.getElementById('authContainer').classList.remove('hidden');
            }
        });

        window.toggleAuthView = function(showId) {
            document.getElementById('loginSection').classList.add('hidden'); document.getElementById('signupSection').classList.add('hidden');
            document.getElementById(showId).classList.remove('hidden');
        }

        window.renderItems = function(category) {
            currentActiveCategory = category; const grid = document.getElementById('resourceGrid'); grid.innerHTML = '';
            const filtered = dbResources.filter(res => res.category === category);
            if (filtered.length === 0) { grid.innerHTML = `<p class="col-span-full text-center text-slate-500 py-10">No materials available in this category yet.</p>`; return; }

            filtered.forEach((item) => {
                const card = document.createElement('div'); card.className = "glass-panel p-8 rounded-3xl group hover:border-blue-300 transition-colors flex flex-col h-full bg-white/50";
                
                const priceVal = parseFloat(item.price);
                const isFree = isNaN(priceVal) || priceVal <= 0;
                const isUnlocked = isFree || currentUserUnlockedTutes.includes(item.id);
                
                let btnText = "View / Download PDF";
                let btnClass = "bg-slate-100 text-slate-800 hover:bg-green-500 hover:text-white";
                let icon = "ph-folder-open";

                if(!isUnlocked) {
                    btnText = `Buy Now - Rs. ${priceVal}`;
                    btnClass = "bg-slate-900 text-white hover:bg-blue-600";
                    icon = "ph-shopping-cart";
                }

                card.innerHTML = `
                    <h3 class="text-xl font-bold text-slate-800 mb-2">${item.title}</h3>
                    <p class="text-slate-600 text-sm mb-6 flex-grow">${item.desc}</p>
                    <button onclick="window.handleAccess(event, '${item.id}', '${item.driveLink}', '${item.price}', '${item.title.replace(/'/g, "\\'")}')" class="w-full py-4 rounded-xl flex items-center justify-center gap-2 font-bold ${btnClass} transition-all duration-300 shadow-sm border border-slate-200">
                        <i class="ph ${icon} text-xl"></i> <span>${btnText}</span>
                    </button>`;
                grid.appendChild(card);
            });
        }

        window.handleAccess = function(event, id, link, price, title) {
            event.preventDefault(); 
            const priceVal = parseFloat(price);
            const isFree = isNaN(priceVal) || priceVal <= 0;

            if (isFree || currentUserUnlockedTutes.includes(id)) { 
                window.open(link, '_blank'); 
            } else {
                // Open Shipping Form for Payment
                currentPurchaseTute = { id: id, title: title, price: priceVal, link: link };
                
                // Pre-fill form if data exists
                if(currentUserData) {
                    document.getElementById('shipName').value = currentUserData.fullName || "";
                    document.getElementById('shipPhone1').value = currentUserData.phone || "";
                }
                
                document.getElementById('payAmountDisplay').innerText = `Rs. ${priceVal}`;
                document.getElementById('shippingModal').classList.remove('hidden'); 
            }
        }

        // --- PAYHERE INTEGRATION ---
        window.initiatePayment = function() {
            const name = document.getElementById('shipName').value;
            const address = document.getElementById('shipAddress').value;
            const postal = document.getElementById('shipPostal').value;
            const phone1 = document.getElementById('shipPhone1').value;
            const phone2 = document.getElementById('shipPhone2').value;

            if(!name || !address || !postal || !phone1) { alert("Please fill all required shipping details."); return; }

            // 1. Prepare Order ID
            const orderId = "TUTE_" + Date.now();

            // 2. Set PayHere Variables (Sandbox test mode enabled)
            var payment = {
                "sandbox": true, // Change to false when going live
                "merchant_id": "1211149", // YOUR PAYHERE MERCHANT ID GOES HERE
                "return_url": window.location.href, // Dummy return URL
                "cancel_url": window.location.href,
                "notify_url": "https://dummy-notify-url.com", // Normally points to a backend server
                "order_id": orderId,
                "items": currentPurchaseTute.title,
                "amount": currentPurchaseTute.price,
                "currency": "LKR",
                "first_name": name,
                "last_name": "",
                "email": currentUser.email,
                "phone": phone1,
                "address": address,
                "city": "Sri Lanka",
                "country": "Sri Lanka"
            };

            // 3. Trigger PayHere
            payhere.startPayment(payment);

            // 4. Handle PayHere Success
            payhere.onCompleted = async function onCompleted(paidOrderId) {
                document.getElementById('payBtn').innerText = "Processing Order...";
                try {
                    // Save Courier Order to DB
                    await setDoc(doc(db, "orders", paidOrderId), {
                        orderId: paidOrderId,
                        studentId: currentUser.uid,
                        studentName: name,
                        email: currentUser.email,
                        phone1: phone1,
                        phone2: phone2,
                        address: address,
                        postalCode: postal,
                        tuteId: currentPurchaseTute.id,
                        tuteTitle: currentPurchaseTute.title,
                        amount: currentPurchaseTute.price,
                        date: new Date()
                    });

                    // Unlock Tute for Student Profile
                    await updateDoc(doc(db, "students", currentUser.uid), {
                        unlockedTutes: arrayUnion(currentPurchaseTute.id)
                    });
                    
                    currentUserUnlockedTutes.push(currentPurchaseTute.id);
                    document.getElementById('shippingModal').classList.add('hidden');
                    alert("Payment Successful! PDF is now unlocked and the physical Tute will be shipped to you.");
                    window.renderItems(currentActiveCategory);
                    window.open(currentPurchaseTute.link, '_blank'); // Auto open PDF
                    
                } catch (e) {
                    alert("Payment received, but error updating profile. Please contact Admin.");
                    console.error(e);
                }
            };

            payhere.onDismissed = function onDismissed() {
                console.log("Payment dismissed");
            };

            payhere.onError = function onError(error) {
                alert("Error connecting to gateway: " + error);
            };
        }

        window.filterItems = function(category, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('bg-slate-900', 'text-white', 'shadow-lg', 'scale-105'); b.classList.add('glass-panel', 'text-slate-600'); });
            btn.classList.remove('glass-panel', 'text-slate-600'); btn.classList.add('bg-slate-900', 'text-white', 'shadow-lg', 'scale-105'); window.renderItems(category);
        }

        window.registerUser = async function() {
            const name = document.getElementById('regName').value; const dob = document.getElementById('regDob').value; const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value; const password = document.getElementById('regPassword').value;
            if(!name || !email || !password) { alert("Please fill Name, Email, and Password!"); return; }
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "students", userCred.user.uid), { fullName: name, birthday: dob, email: email, phone: phone, role: "student", unlockedTutes: [], createdAt: new Date() });
            } catch (error) { alert("Error: " + error.message); }
        }

        window.loginUser = async function() {
            const email = document.getElementById('loginEmail').value; const password = document.getElementById('loginPassword').value;
            if(!email || !password) return;
            try { await signInWithEmailAndPassword(auth, email, password); } catch (error) { alert("Invalid Credentials."); }
        }

        window.logoutUser = async function() { await signOut(auth); }
    </script>
</body>
</html>
