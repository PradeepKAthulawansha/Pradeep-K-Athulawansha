<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Secure Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .hidden { display: none !important; }
        .modal { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="p-6 md:p-10 text-slate-800 items-center justify-center">

    <div id="adminLoginSection" class="glass-card p-10 w-full max-w-md mx-auto text-center">
        <div class="w-20 h-20 rounded-full bg-slate-900 text-white flex items-center justify-center text-4xl mx-auto mb-6 shadow-lg">
            <i class="ph-fill ph-shield-check"></i>
        </div>
        <h2 class="text-2xl font-bold mb-2 text-slate-900">Admin Access</h2>
        <p class="text-slate-500 mb-8 text-sm">Please log in to manage resources.</p>
        
        <div class="space-y-4">
            <input type="text" id="adminUsername" class="w-full p-4 border rounded-xl outline-none focus:border-slate-900 bg-slate-50" placeholder="Username">
            <div class="relative">
                <input type="password" id="adminPassword" class="w-full p-4 border rounded-xl outline-none focus:border-slate-900 bg-slate-50 pr-12" placeholder="Password">
                <button type="button" onclick="window.togglePassword('adminPassword', 'adminEye')" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 hover:text-slate-700 text-2xl transition-colors">
                    <i id="adminEye" class="ph ph-eye"></i>
                </button>
            </div>
            <button onclick="adminLogin()" class="w-full py-4 mt-2 rounded-xl bg-slate-900 text-white font-bold hover:bg-slate-800 transition-all shadow-md active:scale-95">Secure Login</button>
        </div>
        <p id="loginError" class="text-red-500 text-sm mt-4 font-medium hidden">Incorrect Username or Password!</p>
    </div>

    <div id="adminDashboardSection" class="glass-card p-8 md:p-10 w-full max-w-5xl mx-auto hidden mt-4">
        <div class="flex justify-between items-center mb-8 border-b pb-6">
            <div>
                <h2 class="text-3xl font-bold text-slate-900 flex items-center gap-3">
                    <i class="ph-fill ph-database text-blue-600"></i> Resource Manager
                </h2>
                <p class="text-slate-500 mt-2">Publish, edit, and delete student materials.</p>
            </div>
            <button onclick="adminLogout()" class="px-5 py-2 rounded-lg bg-red-50 text-red-600 font-semibold hover:bg-red-100 transition-colors flex items-center gap-2">
                <i class="ph ph-sign-out"></i> Logout
            </button>
        </div>

        <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200 mb-10">
            <h3 class="text-xl font-bold mb-4"><i class="ph ph-plus-circle text-blue-600"></i> Add New Material</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="resTitle" class="w-full p-3 border rounded-xl" placeholder="Title (e.g. 2024 A/L Paper)">
                <select id="resCategory" class="w-full p-3 border rounded-xl bg-white">
                    <option value="AL Past Papers">AL Past Papers</option>
                    <option value="OL Past Papers">OL Past Papers</option>
                    <option value="A/L Tutes">A/L Tutes</option>
                    <option value="O/L Tutes">O/L Tutes</option>
                </select>
                <input type="text" id="resPasscode" class="w-full p-3 border rounded-xl" placeholder="Unlock Passcode (Leave empty if free)">
                <input type="text" id="resDesc" class="w-full p-3 border rounded-xl" placeholder="Short Description">
                
                <div class="col-span-1 md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4 border-t pt-4 mt-2">
                    <div>
                        <label class="block text-sm font-semibold mb-2 text-blue-600">Option 1: Direct File Upload (PDF)</label>
                        <input type="file" id="resFile" accept=".pdf" class="w-full p-2 border rounded-xl bg-white file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2 text-slate-500">Option 2: Google Drive Link (If large file)</label>
                        <input type="url" id="resLink" class="w-full p-3 border rounded-xl" placeholder="Paste Drive Link">
                    </div>
                </div>

                <div class="col-span-1 md:col-span-2 pt-2">
                    <button id="addBtn" onclick="addResource()" class="w-full py-4 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition-all active:scale-[0.98]">
                        Publish Resource
                    </button>
                    <div id="uploadProgressContainer" class="w-full bg-gray-200 rounded-full h-2.5 mt-4 hidden">
                        <div id="uploadProgressBar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div id="statusMsg" class="mt-4 p-3 rounded-xl text-center font-medium hidden"></div>
        </div>

        <div>
            <h3 class="text-xl font-bold mb-4"><i class="ph ph-folder text-blue-600"></i> Manage Existing Resources</h3>
            <div class="overflow-x-auto border rounded-xl">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 text-sm">
                            <th class="p-4 border-b">Title</th>
                            <th class="p-4 border-b">Category</th>
                            <th class="p-4 border-b">Passcode</th>
                            <th class="p-4 border-b">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="resourceTableBody" class="text-sm">
                        <tr><td colspan="4" class="p-4 text-center text-slate-500">Loading resources...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="editModal" class="fixed inset-0 z-[100] modal hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg p-8 rounded-3xl relative shadow-2xl">
            <button onclick="closeEditModal()" class="absolute top-5 right-5 text-slate-400 hover:text-slate-800 text-2xl"><i class="ph ph-x"></i></button>
            <h3 class="text-2xl font-bold mb-6 text-slate-800">Edit Resource</h3>
            
            <input type="hidden" id="editId">
            <div class="space-y-4">
                <input type="text" id="editTitle" class="w-full p-3 border rounded-xl" placeholder="Title">
                <select id="editCategory" class="w-full p-3 border rounded-xl bg-white">
                    <option value="AL Past Papers">AL Past Papers</option>
                    <option value="OL Past Papers">OL Past Papers</option>
                    <option value="A/L Tutes">A/L Tutes</option>
                    <option value="O/L Tutes">O/L Tutes</option>
                </select>
                <input type="text" id="editDesc" class="w-full p-3 border rounded-xl" placeholder="Description">
                <input type="text" id="editPasscode" class="w-full p-3 border rounded-xl" placeholder="Passcode (Empty if free)">
                <input type="url" id="editLink" class="w-full p-3 border rounded-xl" placeholder="File Link">
                
                <button id="updateBtn" onclick="updateResource()" class="w-full py-3 rounded-xl bg-green-600 text-white font-bold hover:bg-green-700 transition-all">
                    Save Changes
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAcmeOtsIU6Ka_Vh5W1IFwm8CjQPUuu34s",
            authDomain: "pradeep-k-athulawansha.firebaseapp.com",
            projectId: "pradeep-k-athulawansha",
            storageBucket: "pradeep-k-athulawansha.firebasestorage.app",
            messagingSenderId: "950027835210",
            appId: "1:950027835210:web:a2894cd14833dc101bd3b3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app); // New: Storage Initialization

        // Password Show/Hide
        window.togglePassword = function(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") { input.type = "text"; icon.classList.replace("ph-eye", "ph-eye-slash"); } 
            else { input.type = "password"; icon.classList.replace("ph-eye-slash", "ph-eye"); }
        }

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "admin@pradeepk.com") {
                document.getElementById('adminLoginSection').classList.add('hidden');
                document.getElementById('adminDashboardSection').classList.remove('hidden');
                loadResources(); // Load table data
            } else {
                document.getElementById('adminDashboardSection').classList.add('hidden');
                document.getElementById('adminLoginSection').classList.remove('hidden');
            }
        });

        window.adminLogin = async function() {
            const userVal = document.getElementById('adminUsername').value.trim();
            const passVal = document.getElementById('adminPassword').value;
            const err = document.getElementById('loginError');
            if(!userVal || !passVal) return;
            try { await signInWithEmailAndPassword(auth, userVal + ".com", passVal); err.classList.add('hidden'); } 
            catch (error) { err.classList.remove('hidden'); }
        }

        window.adminLogout = async function() { await signOut(auth); }

        // --- 1. Load Resources for Table ---
        window.loadResources = async function() {
            const tbody = document.getElementById('resourceTableBody');
            tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-slate-500">Loading...</td></tr>';
            try {
                const querySnapshot = await getDocs(collection(db, "resources"));
                tbody.innerHTML = '';
                if(querySnapshot.empty) { tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-slate-500">No resources found.</td></tr>'; return; }
                
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const docId = doc.id; // Firebase internal document ID
                    const isFree = !data.passcode ? '<span class="px-2 py-1 bg-green-100 text-green-700 rounded-lg text-xs">Free</span>' : data.passcode;
                    
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-slate-50 transition-colors">
                            <td class="p-4 font-medium">${data.title}</td>
                            <td class="p-4 text-slate-500">${data.category}</td>
                            <td class="p-4">${isFree}</td>
                            <td class="p-4 flex gap-2">
                                <button onclick="openEditModal('${docId}', '${data.title.replace(/'/g, "\\'")}', '${data.category}', '${data.desc.replace(/'/g, "\\'")}', '${data.passcode || ''}', '${data.driveLink}')" class="px-3 py-1 bg-blue-100 text-blue-600 rounded hover:bg-blue-200"><i class="ph ph-pencil-simple"></i> Edit</button>
                                <button onclick="deleteResource('${docId}', '${data.driveLink}')" class="px-3 py-1 bg-red-100 text-red-600 rounded hover:bg-red-200"><i class="ph ph-trash"></i> Delete</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) { console.error(error); }
        }

        // --- 2. Add/Upload Resource ---
        window.addResource = async function() {
            const title = document.getElementById('resTitle').value;
            const category = document.getElementById('resCategory').value;
            const desc = document.getElementById('resDesc').value;
            const fileInput = document.getElementById('resFile').files[0];
            let driveLink = document.getElementById('resLink').value;
            const passcodeVal = document.getElementById('resPasscode').value.trim();
            const passcode = passcodeVal === "" ? null : passcodeVal;

            const btn = document.getElementById('addBtn');
            const status = document.getElementById('statusMsg');
            const progressCont = document.getElementById('uploadProgressContainer');
            const progressBar = document.getElementById('uploadProgressBar');

            if(!title || !desc) { alert("Title and Description are required!"); return; }
            if(!fileInput && !driveLink) { alert("Please upload a file OR provide a Drive Link!"); return; }

            btn.disabled = true; btn.innerText = "Publishing...";
            
            try {
                const customId = category.replace(/[^a-zA-Z]/g, '').toLowerCase() + '_' + Date.now();

                // If File is selected, Upload to Firebase Storage first
                if(fileInput) {
                    progressCont.classList.remove('hidden');
                    const storageRef = ref(storage, 'papers/' + customId + '_' + fileInput.name);
                    const uploadTask = uploadBytesResumable(storageRef, fileInput);

                    await new Promise((resolve, reject) => {
                        uploadTask.on('state_changed', 
                            (snapshot) => {
                                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                                progressBar.style.width = progress + '%';
                            }, 
                            (error) => reject(error), 
                            async () => {
                                driveLink = await getDownloadURL(uploadTask.snapshot.ref);
                                resolve();
                            }
                        );
                    });
                }

                // Save to Firestore Database
                await addDoc(collection(db, "resources"), {
                    id: customId, title: title, category: category, desc: desc, driveLink: driveLink, passcode: passcode, createdAt: new Date()
                });

                status.innerText = "✅ Successfully Published!";
                status.className = "mt-4 p-3 rounded-xl text-center font-medium bg-green-50 text-green-700";
                
                // Reset form
                document.querySelectorAll('input').forEach(i => i.value = '');
                progressCont.classList.add('hidden'); progressBar.style.width = '0%';
                loadResources(); // Refresh table
            } catch (error) {
                status.innerText = "❌ Error: " + error.message;
                status.className = "mt-4 p-3 rounded-xl text-center font-medium bg-red-50 text-red-700";
            } finally {
                btn.disabled = false; btn.innerText = "Publish Resource";
                status.classList.remove('hidden'); setTimeout(() => status.classList.add('hidden'), 5000);
            }
        }

        // --- 3. Delete Resource ---
        window.deleteResource = async function(docId, fileUrl) {
            if(!confirm("Are you sure you want to delete this resource?")) return;
            try {
                // Delete from Database
                await deleteDoc(doc(db, "resources", docId));
                
                // Delete from Storage if it was a directly uploaded file
                if(fileUrl.includes("firebasestorage.googleapis.com")) {
                    const fileRef = ref(storage, fileUrl);
                    await deleteObject(fileRef).catch(e => console.log("File not in storage or already deleted"));
                }
                alert("Deleted successfully!");
                loadResources(); // Refresh table
            } catch (error) { alert("Error deleting: " + error.message); }
        }

        // --- 4. Edit Resource ---
        window.openEditModal = function(id, title, category, desc, passcode, link) {
            document.getElementById('editId').value = id;
            document.getElementById('editTitle').value = title;
            document.getElementById('editCategory').value = category;
            document.getElementById('editDesc').value = desc;
            document.getElementById('editPasscode').value = passcode;
            document.getElementById('editLink').value = link;
            document.getElementById('editModal').classList.remove('hidden');
        }

        window.closeEditModal = function() { document.getElementById('editModal').classList.add('hidden'); }

        window.updateResource = async function() {
            const id = document.getElementById('editId').value;
            const btn = document.getElementById('updateBtn');
            btn.innerText = "Saving...";
            
            try {
                const docRef = doc(db, "resources", id);
                await updateDoc(docRef, {
                    title: document.getElementById('editTitle').value,
                    category: document.getElementById('editCategory').value,
                    desc: document.getElementById('editDesc').value,
                    passcode: document.getElementById('editPasscode').value || null,
                    driveLink: document.getElementById('editLink').value
                });
                closeEditModal();
                loadResources();
            } catch (error) { alert("Error updating: " + error.message); }
            finally { btn.innerText = "Save Changes"; }
        }
    </script>
</body>
</html>
