<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Secure Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .hidden { display: none !important; }
        .modal { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); z-index: 1000;}
        ::-webkit-scrollbar { height: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-10 text-slate-800 items-center justify-center">

    <!-- Login Section -->
    <div id="adminLoginSection" class="glass-card p-10 w-full max-w-md mx-auto text-center mt-20">
        <div class="w-20 h-20 rounded-full bg-slate-900 text-white flex items-center justify-center text-4xl mx-auto mb-6 shadow-lg"><i class="ph-fill ph-shield-check"></i></div>
        <h2 class="text-2xl font-bold mb-2 text-slate-900">Admin Access</h2>
        <div class="space-y-4">
            <input type="text" id="adminUsername" class="w-full p-4 border rounded-xl outline-none focus:border-slate-900 bg-slate-50" placeholder="Username">
            <div class="relative">
                <input type="password" id="adminPassword" class="w-full p-4 border rounded-xl outline-none focus:border-slate-900 bg-slate-50 pr-12" placeholder="Password">
                <button type="button" onclick="window.togglePassword('adminPassword', 'adminEye')" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 hover:text-slate-700 text-2xl"><i id="adminEye" class="ph ph-eye"></i></button>
            </div>
            <button onclick="adminLogin()" class="w-full py-4 mt-2 rounded-xl bg-slate-900 text-white font-bold hover:bg-slate-800 transition-all shadow-md">Secure Login</button>
        </div>
        <p id="loginError" class="text-red-500 text-sm mt-4 font-medium hidden">Incorrect Username or Password!</p>
    </div>

    <!-- Dashboard Section -->
    <div id="adminDashboardSection" class="w-full max-w-7xl mx-auto hidden">
        <div class="glass-card p-6 md:p-8 flex flex-col md:flex-row justify-between items-center mb-8">
            <div>
                <h2 class="text-3xl font-bold text-slate-900 flex items-center gap-3"><i class="ph-fill ph-database text-blue-600"></i> Master Dashboard</h2>
            </div>
            <button onclick="adminLogout()" class="px-5 py-2 mt-4 md:mt-0 rounded-lg bg-red-50 text-red-600 font-semibold hover:bg-red-100 transition-colors flex items-center gap-2">
                <i class="ph ph-sign-out"></i> Logout
            </button>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            
            <!-- LEFT COLUMN: Quiz Uploader & Management -->
            <div class="xl:col-span-1 space-y-8">
                
                <!-- ADVANCED: Daily Quiz Uploader -->
                <div class="glass-card p-6 md:p-8 border-t-4 border-indigo-500">
                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2 text-slate-800"><i class="ph-fill ph-rocket-launch text-indigo-600"></i> Daily Quiz</h3>
                    
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1">Date</label>
                                <input type="date" id="q-date" required class="w-full p-2.5 border rounded-xl text-sm outline-none focus:border-indigo-400 bg-slate-50">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1">Grade</label>
                                <select id="q-grade" class="w-full p-2.5 border rounded-xl text-sm outline-none bg-slate-50 focus:border-indigo-400">
                                    <option value="10_11">Grade 10/11</option>
                                    <option value="12_13">Grade 12/13</option>
                                </select>
                            </div>
                        </div>
                        
                        <div>
                            <textarea id="q-text" rows="3" required placeholder="Type the question here..." class="w-full p-3 border rounded-xl text-sm outline-none focus:border-indigo-400 bg-slate-50"></textarea>
                        </div>
                        
                        <!-- Dynamic Options Area -->
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-2">Options (Select the correct one)</label>
                            <div id="dynamic-options-container" class="space-y-2">
                                <!-- Default 4 options -->
                            </div>
                            <button onclick="addOptionField()" class="text-xs font-semibold text-indigo-600 hover:text-indigo-800 mt-2 flex items-center gap-1"><i class="ph ph-plus"></i> Add Another Option</button>
                        </div>

                        <button id="uploadQuizBtn" onclick="uploadDailyQuiz()" class="w-full py-3 mt-4 rounded-xl bg-indigo-600 text-white font-bold hover:bg-indigo-700 transition-all text-sm">Publish Quiz</button>
                        <div id="quizStatusMsg" class="mt-2 p-2 rounded-xl text-center font-medium text-xs hidden"></div>
                    </div>
                </div>

                <!-- NEW: Manage Quizzes -->
                <div class="glass-card p-6 md:p-8">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-bold flex items-center gap-2 text-slate-800"><i class="ph-fill ph-list-dashes text-indigo-500"></i> Manage Quizzes</h3>
                        <select id="manage-q-grade" onchange="loadQuizzes()" class="p-1 border rounded text-xs outline-none bg-slate-50">
                            <option value="10_11">Grade 10/11</option>
                            <option value="12_13">Grade 12/13</option>
                        </select>
                    </div>
                    <div class="overflow-y-auto max-h-[300px] border rounded-xl">
                        <table class="w-full text-left border-collapse whitespace-nowrap">
                            <tbody id="quizTableBody" class="text-xs">
                                <tr><td class="p-4 text-center text-slate-500">Loading quizzes...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>

            <!-- RIGHT COLUMN: Students, Orders, Resources -->
            <div class="xl:col-span-2 space-y-8">
                
                <!-- NEW: Student Leaderboards -->
                <div class="glass-card p-6 md:p-8 border-t-4 border-yellow-500">
                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="ph-fill ph-ranking text-yellow-500"></i> Student Rankings (Leaderboard)</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Grade 10/11 Board -->
                        <div class="border rounded-xl bg-slate-50 p-4">
                            <h4 class="font-bold text-slate-700 mb-3 border-b pb-2">Grade 10/11</h4>
                            <div class="space-y-2" id="lb-10-11">
                                <div class="text-center text-xs text-slate-500 py-4">Loading...</div>
                            </div>
                        </div>
                        <!-- Grade 12/13 Board -->
                        <div class="border rounded-xl bg-slate-50 p-4">
                            <h4 class="font-bold text-slate-700 mb-3 border-b pb-2">Grade 12/13</h4>
                            <div class="space-y-2" id="lb-12-13">
                                <div class="text-center text-xs text-slate-500 py-4">Loading...</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Existing Resources & Orders (Keep minimal layout) -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="glass-card p-6 border-t-4 border-blue-500">
                        <h3 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="ph-fill ph-folder text-blue-500"></i> Quick Add Material</h3>
                        <div class="space-y-3 text-sm">
                            <input type="text" id="resTitle" class="w-full p-2 border rounded-lg" placeholder="Title">
                            <select id="resCategory" class="w-full p-2 border rounded-lg bg-white">
                                <option value="Grade 10 Tutes">Grade 10 Tutes</option>
                                <option value="Grade 11 Tutes">Grade 11 Tutes</option>
                                <option value="Grade 12 Tutes">Grade 12 Tutes</option>
                                <option value="Grade 13 Tutes">Grade 13 Tutes</option>
                            </select>
                            <input type="text" id="resLink" class="w-full p-2 border rounded-lg" placeholder="Drive Link">
                            <button onclick="addResource()" class="w-full py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700">Publish</button>
                        </div>
                    </div>

                    <div class="glass-card p-6">
                        <h3 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="ph-fill ph-users text-blue-500"></i> Registered Students</h3>
                        <div class="overflow-y-auto max-h-[200px] border rounded-xl">
                            <table class="w-full text-left border-collapse text-xs">
                                <thead>
                                    <tr class="bg-slate-100 text-slate-600"><th class="p-2 border-b">Name</th><th class="p-2 border-b">Phone</th></tr>
                                </thead>
                                <tbody id="studentTableBody"><tr><td colspan="2" class="p-2 text-center text-slate-500">Loading...</td></tr></tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Quiz Edit Modal -->
    <div id="quizEditModal" class="fixed inset-0 modal hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg p-6 md:p-8 rounded-3xl relative shadow-2xl">
            <button onclick="closeQuizModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-800 text-2xl"><i class="ph ph-x"></i></button>
            <h3 class="text-xl font-bold mb-4 text-slate-800"><i class="ph-fill ph-pencil-simple text-indigo-600"></i> Edit Quiz</h3>
            
            <input type="hidden" id="edit-q-date">
            <input type="hidden" id="edit-q-grade">
            
            <div class="space-y-4">
                <textarea id="edit-q-text" rows="3" class="w-full p-3 border rounded-xl text-sm outline-none bg-slate-50"></textarea>
                
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-2">Options</label>
                    <div id="edit-dynamic-options-container" class="space-y-2"></div>
                    <button onclick="addEditOptionField()" class="text-xs font-semibold text-indigo-600 mt-2 flex items-center gap-1"><i class="ph ph-plus"></i> Add Option</button>
                </div>
                
                <button id="updateQuizBtn" onclick="updateDailyQuiz()" class="w-full py-3 rounded-xl bg-indigo-600 text-white font-bold hover:bg-indigo-700">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, doc, deleteDoc, updateDoc, orderBy, query, setDoc, where, limit } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // ඔයාගේ Firebase Config (මෙතන දාන්න)
        const firebaseConfig = {
            apiKey: "AIzaSyAcmeOtsIU6Ka_Vh5W1IFwm8CjQPUuu34s",
            authDomain: "pradeep-k-athulawansha.firebaseapp.com",
            projectId: "pradeep-k-athulawansha",
            storageBucket: "pradeep-k-athulawansha.firebasestorage.app",
            messagingSenderId: "950027835210",
            appId: "1:950027835210:web:a2894cd14833dc101bd3b3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Authentication ---
        window.togglePassword = function(inputId, iconId) {
            const input = document.getElementById(inputId); const icon = document.getElementById(iconId);
            if (input.type === "password") { input.type = "text"; icon.classList.replace("ph-eye", "ph-eye-slash"); } 
            else { input.type = "password"; icon.classList.replace("ph-eye-slash", "ph-eye"); }
        }

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "admin@pradeepk.com") {
                document.getElementById('adminLoginSection').classList.add('hidden');
                document.getElementById('adminDashboardSection').classList.remove('hidden');
                initAdmin();
            } else {
                document.getElementById('adminDashboardSection').classList.add('hidden');
                document.getElementById('adminLoginSection').classList.remove('hidden');
            }
        });

        window.adminLogin = async function() {
            const userVal = document.getElementById('adminUsername').value.trim(); const passVal = document.getElementById('adminPassword').value;
            const err = document.getElementById('loginError'); if(!userVal || !passVal) return;
            try { await signInWithEmailAndPassword(auth, userVal + ".com", passVal); err.classList.add('hidden'); } 
            catch (error) { err.classList.remove('hidden'); }
        }
        window.adminLogout = async function() { await signOut(auth); }

        function initAdmin() {
            document.getElementById('q-date').valueAsDate = new Date();
            initOptionFields();
            loadQuizzes();
            loadLeaderboards();
            loadStudents();
        }

        // --- DYNAMIC QUIZ OPTIONS LOGIC ---
        let optionCount = 0;
        
        function initOptionFields() {
            document.getElementById('dynamic-options-container').innerHTML = '';
            optionCount = 0;
            for(let i=0; i<4; i++) addOptionField(); // Start with 4
            document.querySelector('input[name="correctOpt"][value="0"]').checked = true;
        }

        window.addOptionField = function() {
            const container = document.getElementById('dynamic-options-container');
            const div = document.createElement('div');
            div.className = "flex items-center gap-3";
            div.innerHTML = `
                <input type="radio" name="correctOpt" value="${optionCount}" class="w-4 h-4 text-indigo-600 focus:ring-indigo-500 cursor-pointer">
                <input type="text" id="opt-${optionCount}" required placeholder="Option ${optionCount + 1}" class="w-full p-2 border rounded-lg text-sm outline-none focus:border-indigo-400 bg-white">
                ${optionCount >= 2 ? `<button type="button" onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600"><i class="ph-fill ph-trash"></i></button>` : `<div class="w-4"></div>`}
            `;
            container.appendChild(div);
            optionCount++;
        }

        window.uploadDailyQuiz = async function() {
            const btn = document.getElementById('uploadQuizBtn');
            const status = document.getElementById('quizStatusMsg');
            
            const date = document.getElementById('q-date').value;
            const grade = document.getElementById('q-grade').value;
            const question = document.getElementById('q-text').value;
            
            // Get all options
            const options = [];
            const optionInputs = document.querySelectorAll('#dynamic-options-container input[type="text"]');
            optionInputs.forEach(input => { if(input.value.trim() !== '') options.push(input.value.trim()); });
            
            // Get correct answer
            const correctRadio = document.querySelector('input[name="correctOpt"]:checked');
            
            if(!date || !question || options.length < 2 || !correctRadio) {
                alert("කරුණාකර ප්‍රශ්නය සහ පිළිතුරු (අවම 2ක්) ඇතුළත් කර නිවැරදි පිළිතුර තෝරන්න."); return;
            }

            // Determine index of the selected radio relative to the valid options
            let correctAnsIndex = 0;
            const radios = document.querySelectorAll('input[name="correctOpt"]');
            for(let i=0; i<radios.length; i++) {
                if(radios[i].checked) { correctAnsIndex = i; break; }
            }

            btn.innerText = "Publishing..."; btn.disabled = true;
            status.classList.add('hidden');
            
            try {
                const publicCollection = `dailyQuestions_${grade}`;
                const secretCollection = `secretAnswers_${grade}`;

                await setDoc(doc(db, publicCollection, date), { q: question, options: options });
                await setDoc(doc(db, secretCollection, date), { ans: correctAnsIndex });

                status.innerText = "✅ Quiz Published!";
                status.className = "mt-2 p-2 rounded-xl text-center font-bold bg-green-50 text-green-700 block";
                
                document.getElementById('q-text').value = '';
                initOptionFields(); // reset
                loadQuizzes(); // refresh table
                
            } catch (error) {
                console.error("Quiz Upload Error:", error);
                status.innerText = "❌ Error: " + error.message;
                status.className = "mt-2 p-2 rounded-xl text-center font-bold bg-red-50 text-red-700 block";
            } finally {
                btn.innerText = "Publish Quiz"; btn.disabled = false;
                setTimeout(() => status.classList.add('hidden'), 3000);
            }
        }

        // --- MANAGE QUIZZES ---
        window.loadQuizzes = async function() {
            const grade = document.getElementById('manage-q-grade').value;
            const tbody = document.getElementById('quizTableBody');
            tbody.innerHTML = '<tr><td class="p-4 text-center text-slate-500">Loading...</td></tr>';
            
            try {
                const querySnapshot = await getDocs(collection(db, `dailyQuestions_${grade}`));
                tbody.innerHTML = '';
                if(querySnapshot.empty) { tbody.innerHTML = '<tr><td class="p-4 text-center text-slate-500">No quizzes uploaded yet.</td></tr>'; return; }
                
                // Convert to array and sort by date descending
                let quizzes = [];
                querySnapshot.forEach(doc => quizzes.push({ id: doc.id, ...doc.data() }));
                quizzes.sort((a, b) => new Date(b.id) - new Date(a.id));

                quizzes.forEach(data => {
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-slate-50">
                            <td class="p-3 font-semibold text-slate-700 w-24">${data.id}</td>
                            <td class="p-3 truncate max-w-[150px] text-slate-500" title="${data.q}">${data.q}</td>
                            <td class="p-3 text-right">
                                <button onclick="openEditQuiz('${data.id}', '${grade}')" class="text-blue-500 hover:text-blue-700 mr-2"><i class="ph-fill ph-pencil-simple text-lg"></i></button>
                                <button onclick="deleteQuiz('${data.id}', '${grade}')" class="text-red-400 hover:text-red-600"><i class="ph-fill ph-trash text-lg"></i></button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) { console.error(error); tbody.innerHTML = '<tr><td class="p-4 text-red-400">Error loading quizzes</td></tr>';}
        }

        window.deleteQuiz = async function(date, grade) {
            if(!confirm(`Are you sure you want to delete the quiz for ${date}?`)) return;
            try {
                await deleteDoc(doc(db, `dailyQuestions_${grade}`, date));
                await deleteDoc(doc(db, `secretAnswers_${grade}`, date));
                loadQuizzes();
            } catch (e) { alert("Error deleting quiz."); }
        }

        // --- EDIT QUIZ LOGIC ---
        let editOptionCount = 0;
        
        window.openEditQuiz = async function(date, grade) {
            document.getElementById('edit-q-date').value = date;
            document.getElementById('edit-q-grade').value = grade;
            
            try {
                const qSnap = await getDoc(doc(db, `dailyQuestions_${grade}`, date));
                const aSnap = await getDoc(doc(db, `secretAnswers_${grade}`, date));
                
                if(!qSnap.exists()) return;
                
                const data = qSnap.data();
                const ansData = aSnap.exists() ? aSnap.data() : { ans: 0 };
                
                document.getElementById('edit-q-text').value = data.q;
                
                const container = document.getElementById('edit-dynamic-options-container');
                container.innerHTML = '';
                editOptionCount = 0;
                
                data.options.forEach((opt, index) => {
                    addEditOptionField(opt, index === ansData.ans);
                });
                
                document.getElementById('quizEditModal').classList.remove('hidden');
            } catch (e) { alert("Error loading quiz data."); }
        }

        window.addEditOptionField = function(val = "", isChecked = false) {
            const container = document.getElementById('edit-dynamic-options-container');
            const div = document.createElement('div');
            div.className = "flex items-center gap-3";
            div.innerHTML = `
                <input type="radio" name="editCorrectOpt" value="${editOptionCount}" ${isChecked ? 'checked' : ''} class="w-4 h-4 text-indigo-600 focus:ring-indigo-500 cursor-pointer">
                <input type="text" value="${val}" required placeholder="Option ${editOptionCount + 1}" class="edit-opt-input w-full p-2 border rounded-lg text-sm outline-none focus:border-indigo-400 bg-white">
                <button type="button" onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600"><i class="ph-fill ph-trash"></i></button>
            `;
            container.appendChild(div);
            editOptionCount++;
        }

        window.closeQuizModal = function() { document.getElementById('quizEditModal').classList.add('hidden'); }

        window.updateDailyQuiz = async function() {
            const date = document.getElementById('edit-q-date').value;
            const grade = document.getElementById('edit-q-grade').value;
            const question = document.getElementById('edit-q-text').value;
            
            const options = [];
            const optionInputs = document.querySelectorAll('.edit-opt-input');
            optionInputs.forEach(input => { if(input.value.trim() !== '') options.push(input.value.trim()); });
            
            const correctRadio = document.querySelector('input[name="editCorrectOpt"]:checked');
            
            if(!question || options.length < 2 || !correctRadio) {
                alert("Please provide the question, at least 2 options, and select the correct answer."); return;
            }

            let correctAnsIndex = 0;
            const radios = document.querySelectorAll('input[name="editCorrectOpt"]');
            for(let i=0; i<radios.length; i++) { if(radios[i].checked) { correctAnsIndex = i; break; } }

            const btn = document.getElementById('updateQuizBtn');
            btn.innerText = "Saving..."; btn.disabled = true;
            
            try {
                await updateDoc(doc(db, `dailyQuestions_${grade}`, date), { q: question, options: options });
                await updateDoc(doc(db, `secretAnswers_${grade}`, date), { ans: correctAnsIndex });
                closeQuizModal();
                loadQuizzes();
            } catch (e) { alert("Error saving quiz."); }
            finally { btn.innerText = "Save Changes"; btn.disabled = false; }
        }

        // --- STUDENT LEADERBOARDS ---
        window.loadLeaderboards = async function() {
            renderBoard('10/11', 'lb-10-11');
            renderBoard('12/13', 'lb-12-13');
        }

        async function renderBoard(grade, elementId) {
            const container = document.getElementById(elementId);
            try {
                const q = query(collection(db, "users"), where("grade", "==", grade), orderBy("points", "desc"), limit(10));
                const snapshot = await getDocs(q);
                
                container.innerHTML = '';
                if(snapshot.empty) { container.innerHTML = '<div class="text-center text-xs text-slate-500 py-4">No data yet.</div>'; return; }
                
                let rank = 1;
                snapshot.forEach(doc => {
                    const data = doc.data();
                    let icon = `<span class="text-slate-400 font-bold w-4">${rank}</span>`;
                    if(rank === 1) icon = '👑'; else if(rank === 2) icon = '🥈'; else if(rank === 3) icon = '🥉';
                    
                    container.innerHTML += `
                        <div class="flex justify-between items-center bg-white p-2 rounded-lg border shadow-sm text-xs">
                            <div class="flex items-center gap-2">
                                ${icon} <span class="font-bold text-slate-700">${data.fullName || 'Student'}</span>
                            </div>
                            <span class="bg-blue-100 text-blue-700 font-bold px-2 py-1 rounded">${data.points || 0}</span>
                        </div>
                    `;
                    rank++;
                });
            } catch (e) { console.error(e); container.innerHTML = '<div class="text-center text-xs text-red-400 py-4">Error loading data.</div>'; }
        }

        // --- LOAD STUDENTS ---
        window.loadStudents = async function() {
            const tbody = document.getElementById('studentTableBody');
            try {
                const q = query(collection(db, "users"), orderBy("points", "desc"), limit(20)); // Load top 20 users
                const snapshot = await getDocs(q); tbody.innerHTML = '';
                if(snapshot.empty) { tbody.innerHTML = '<tr><td colspan="2" class="p-2 text-center text-slate-500">No students yet.</td></tr>'; return; }
                snapshot.forEach((doc) => {
                    const data = doc.data(); 
                    if(data.email === 'admin@pradeepk.com') return;
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-slate-50">
                            <td class="p-2 font-semibold text-slate-700 truncate max-w-[120px]">${data.fullName || 'Unknown'}</td>
                            <td class="p-2 text-slate-500"><a href="tel:${data.phone || ''}">${data.phone || 'N/A'}</a></td>
                        </tr>`;
                });
            } catch (error) { console.error(error); }
        }

        // Minimal Add Resource
        window.addResource = async function() {
            const title = document.getElementById('resTitle').value;
            const category = document.getElementById('resCategory').value;
            const link = document.getElementById('resLink').value;
            if(!title || !link) { alert("Title and Link are required!"); return; }
            
            try {
                const customId = category.replace(/[^a-zA-Z]/g, '').toLowerCase() + '_' + Date.now();
                await setDoc(doc(db, "resources", customId), { title: title, category: category, driveLink: link, createdAt: new Date() });
                alert("Published!");
                document.getElementById('resTitle').value = ''; document.getElementById('resLink').value = '';
            } catch (error) { alert("Error: " + error.message); } 
        }
    </script>
</body>
</html>
