<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-6 md:p-10 text-slate-800 items-center justify-center">

    <div id="adminLoginSection" class="glass-card p-10 w-full max-w-md mx-auto text-center">
        <div class="w-20 h-20 rounded-full bg-slate-900 text-white flex items-center justify-center text-4xl mx-auto mb-6 shadow-lg">
            <i class="ph-fill ph-shield-check"></i>
        </div>
        <h2 class="text-2xl font-bold mb-2 text-slate-900">Admin Access</h2>
        <p class="text-slate-500 mb-8 text-sm">Please log in to manage resources.</p>
        
        <div class="space-y-4">
            <input type="text" id="adminUsername" class="w-full p-4 border rounded-xl outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200 transition-all bg-slate-50" placeholder="Username">
            
            <div class="relative">
                <input type="password" id="adminPassword" class="w-full p-4 border rounded-xl outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200 transition-all bg-slate-50 pr-12" placeholder="Password">
                <button type="button" onclick="window.togglePassword('adminPassword', 'adminEye')" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 hover:text-slate-700 text-2xl transition-colors outline-none">
                    <i id="adminEye" class="ph ph-eye"></i>
                </button>
            </div>
            
            <button id="loginBtn" onclick="adminLogin()" class="w-full py-4 mt-2 rounded-xl bg-slate-900 text-white font-bold hover:bg-slate-800 transition-all shadow-md active:scale-95">
                Secure Login
            </button>
        </div>
        <p id="loginError" class="text-red-500 text-sm mt-4 font-medium hidden">Incorrect Username or Password!</p>
    </div>

    <div id="adminDashboardSection" class="glass-card p-8 md:p-10 w-full max-w-3xl mx-auto hidden mt-10">
        <div class="flex justify-between items-center mb-8 border-b pb-6">
            <div>
                <h2 class="text-3xl font-bold text-slate-900 flex items-center gap-3">
                    <i class="ph-fill ph-database text-blue-600"></i> Add New Resource
                </h2>
                <p class="text-slate-500 mt-2">Publish papers and tutes directly to the student portal.</p>
            </div>
            <button onclick="adminLogout()" class="px-5 py-2 rounded-lg bg-red-50 text-red-600 font-semibold hover:bg-red-100 transition-colors flex items-center gap-2">
                <i class="ph ph-sign-out"></i> Logout
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="col-span-1 md:col-span-2">
                <label class="block text-sm font-semibold mb-2 text-slate-700">Title / Lesson Name</label>
                <input type="text" id="resTitle" class="w-full p-3 border rounded-xl outline-none focus:border-blue-500 bg-slate-50" placeholder="e.g. 2024 A/L Exam Paper - Part 1">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2 text-slate-700">Category</label>
                <select id="resCategory" class="w-full p-3 border rounded-xl outline-none focus:border-blue-500 bg-slate-50">
                    <option value="AL Past Papers">AL Past Papers</option>
                    <option value="OL Past Papers">OL Past Papers</option>
                    <option value="A/L Tutes">A/L Tutes</option>
                    <option value="O/L Tutes">O/L Tutes</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2 text-slate-700">Unlock Passcode</label>
                <input type="text" id="resPasscode" class="w-full p-3 border rounded-xl outline-none focus:border-blue-500 bg-slate-50" placeholder="Leave empty if free">
            </div>
            <div class="col-span-1 md:col-span-2">
                <label class="block text-sm font-semibold mb-2 text-slate-700">Short Description</label>
                <input type="text" id="resDesc" class="w-full p-3 border rounded-xl outline-none focus:border-blue-500 bg-slate-50" placeholder="e.g. Complete past paper and marking scheme.">
            </div>
            <div class="col-span-1 md:col-span-2">
                <label class="block text-sm font-semibold mb-2 text-slate-700">Google Drive PDF Link</label>
                <input type="url" id="resLink" class="w-full p-3 border rounded-xl outline-none focus:border-blue-500 bg-slate-50" placeholder="Paste Google Drive Link Here">
            </div>
            <div class="col-span-1 md:col-span-2 pt-4">
                <button id="addBtn" onclick="addResource()" class="w-full py-4 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 shadow-lg shadow-blue-500/30 transition-all active:scale-[0.98]">
                    <i class="ph ph-cloud-arrow-up mr-2"></i> Publish to Database
                </button>
            </div>
        </div>
        <div id="statusMsg" class="mt-6 p-4 rounded-xl text-center font-medium hidden"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAcmeOtsIU6Ka_Vh5W1IFwm8CjQPUuu34s",
            authDomain: "pradeep-k-athulawansha.firebaseapp.com",
            projectId: "pradeep-k-athulawansha",
            storageBucket: "pradeep-k-athulawansha.firebasestorage.app",
            messagingSenderId: "950027835210",
            appId: "1:950027835210:web:a2894cd14833dc101bd3b3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Show/Hide Password Logic
        window.togglePassword = function(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("ph-eye", "ph-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("ph-eye-slash", "ph-eye");
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "admin@pradeepk.com") {
                document.getElementById('adminLoginSection').classList.add('hidden');
                document.getElementById('adminDashboardSection').classList.remove('hidden');
            } else {
                document.getElementById('adminDashboardSection').classList.add('hidden');
                document.getElementById('adminLoginSection').classList.remove('hidden');
            }
        });

        window.adminLogin = async function() {
            const userVal = document.getElementById('adminUsername').value.trim();
            const passVal = document.getElementById('adminPassword').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('loginError');

            if(!userVal || !passVal) return;

            btn.disabled = true; btn.innerText = "Verifying...";
            err.classList.add('hidden');

            try {
                const emailFormat = userVal + ".com"; 
                await signInWithEmailAndPassword(auth, emailFormat, passVal);
            } catch (error) {
                err.classList.remove('hidden');
            } finally {
                btn.disabled = false; btn.innerText = "Secure Login";
            }
        }

        window.adminLogout = async function() {
            await signOut(auth);
            document.getElementById('adminUsername').value = '';
            document.getElementById('adminPassword').value = '';
        }

        window.addResource = async function() {
            const title = document.getElementById('resTitle').value;
            const category = document.getElementById('resCategory').value;
            const desc = document.getElementById('resDesc').value;
            const driveLink = document.getElementById('resLink').value;
            const passcodeVal = document.getElementById('resPasscode').value.trim();
            const passcode = passcodeVal === "" ? null : passcodeVal;

            const btn = document.getElementById('addBtn');
            const status = document.getElementById('statusMsg');

            if(!title || !desc || !driveLink) { alert("Please fill Title, Description and Drive Link!"); return; }

            btn.disabled = true; btn.innerHTML = "<i class='ph ph-spinner animate-spin mr-2'></i> Publishing...";
            status.classList.add('hidden');
            
            try {
                const docId = category.replace(/[^a-zA-Z]/g, '').toLowerCase() + '_' + Date.now();
                await addDoc(collection(db, "resources"), {
                    id: docId, title: title, category: category, desc: desc, driveLink: driveLink, passcode: passcode, createdAt: new Date()
                });

                status.innerText = "✅ Resource Successfully Published!";
                status.className = "mt-6 p-4 rounded-xl text-center font-medium bg-green-50 text-green-700 border border-green-200";
                
                document.getElementById('resTitle').value = ''; document.getElementById('resDesc').value = '';
                document.getElementById('resLink').value = ''; document.getElementById('resPasscode').value = '';
            } catch (error) {
                status.innerText = "❌ Error: " + error.message;
                status.className = "mt-6 p-4 rounded-xl text-center font-medium bg-red-50 text-red-700 border border-red-200";
            } finally {
                btn.disabled = false; btn.innerHTML = "<i class='ph ph-cloud-arrow-up mr-2'></i> Publish to Database";
                status.classList.remove('hidden'); setTimeout(() => status.classList.add('hidden'), 5000);
            }
        }
    </script>
</body>
</html>
