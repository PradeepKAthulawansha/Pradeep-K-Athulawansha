<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Pradeep K. Athulawansha</title>
    <style>
        /* Modern Glassmorphism CSS */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 90%;
            max-width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .hidden { display: none !important; }

        h2 { margin-top: 0; margin-bottom: 10px; }
        p { margin-top: 0; margin-bottom: 20px; font-size: 14px; color: #ddd; }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            outline: none;
            box-sizing: border-box;
            font-size: 15px;
        }
        
        input::placeholder { color: #ddd; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #ff7eb3;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover { background: #ff758c; }
        button:disabled { background: #888; cursor: not-allowed; }

        .toggle-link {
            display: inline-block;
            margin-top: 15px;
            color: #00f2fe;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            margin-left: 5px;
            margin-right: 5px;
        }
        
        .toggle-link:hover { text-decoration: underline; }

        .link-container {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 13px;
        }

        .dashboard-container { max-width: 600px; }
        .tute-card {
            background: rgba(255, 255, 255, 0.15);
            margin: 15px 0;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
        }
        
        .download-btn { background: #4facfe; padding: 8px 15px; margin-top: 0; width: auto; }
        .download-btn:hover { background: #00f2fe; }
        .logout-btn { background: #ff4b2b; width: auto; padding: 8px 20px; }
        .logout-btn:hover { background: #ff416c; }

    </style>
</head>
<body>

    <div id="loginSection" class="glass-panel">
        <h2>Student Login</h2>
        <p>2028 Batch - Online Tutes</p>
        <input type="email" id="loginEmail" placeholder="Email Address">
        <input type="password" id="loginPassword" placeholder="Password">
        <button id="loginBtn" onclick="loginUser()">Log In</button>
        
        <div class="link-container">
            <span class="toggle-link" onclick="toggleView('forgotSection')">Forgot Password?</span>
            <span class="toggle-link" onclick="toggleView('signupSection')">Sign Up</span>
        </div>
    </div>

    <div id="signupSection" class="glass-panel hidden">
        <h2>Create Account</h2>
        <p>Register for 2028 Batch</p>
        <input type="text" id="regName" placeholder="Full Name">
        <input type="date" id="regDob" placeholder="Birthday">
        <input type="email" id="regEmail" placeholder="Email Address">
        <input type="tel" id="regPhone" placeholder="Contact No (e.g. 071...)">
        <input type="text" id="regUsername" placeholder="Choose a Username">
        <input type="password" id="regPassword" placeholder="Create Password">
        
        <button id="signupBtn" onclick="registerUser()">Sign Up</button>
        <span class="toggle-link" style="display: block; text-align: center;" onclick="toggleView('loginSection')">Already have an account? Log In</span>
    </div>

    <div id="forgotSection" class="glass-panel hidden">
        <h2>Reset Password</h2>
        <p>Enter your Email to receive a reset link</p>
        <input type="email" id="forgotEmail" placeholder="Registered Email Address">
        <button onclick="resetUserPassword()">Send Reset Link</button>
        <span class="toggle-link" style="display: block; text-align: center;" onclick="toggleView('loginSection')">Back to Login</span>
    </div>

    <div id="dashboardSection" class="glass-panel dashboard-container hidden">
        <h2>My Tutes</h2>
        <p id="welcomeMsg">Welcome!</p>
        
        <div class="tute-card">
            <span>📚 Unit 01 - Measurements Theory</span>
            <button class="download-btn">Download PDF</button>
        </div>
        <div class="tute-card">
            <span>📝 Unit 01 - Past Paper Questions</span>
            <button class="download-btn">Download PDF</button>
        </div>

        <button class="logout-btn" onclick="logoutUser()">Log Out</button>
    </div>

    <script type="module">
        // Firebase Core and Auth
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAcmeOtsIU6Ka_Vh5W1IFwm8CjQPUuu34s",
            authDomain: "pradeep-k-athulawansha.firebaseapp.com",
            projectId: "pradeep-k-athulawansha",
            storageBucket: "pradeep-k-athulawansha.firebasestorage.app",
            messagingSenderId: "950027835210",
            appId: "1:950027835210:web:a2894cd14833dc101bd3b3"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI Toggle Function
        window.toggleView = function(showId) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('signupSection').classList.add('hidden');
            document.getElementById('forgotSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.add('hidden');
            document.getElementById(showId).classList.remove('hidden');
        }

        // --- 1. User Registration ---
        window.registerUser = async function() {
            const name = document.getElementById('regName').value;
            const dob = document.getElementById('regDob').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const btn = document.getElementById('signupBtn');

            if(!name || !email || !password) {
                alert("Please fill in at least Name, Email, and Password!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Registering...";

            try {
                // Create user in Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Save extra details in Firestore Database
                await setDoc(doc(db, "students", user.uid), {
                    fullName: name,
                    birthday: dob,
                    email: email,
                    phone: phone,
                    username: username,
                    role: "student",
                    createdAt: new Date()
                });

                alert("Account created successfully! Please log in.");
                toggleView('loginSection');
                document.getElementById('loginEmail').value = email; 
            } catch (error) {
                alert("Error: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Sign Up";
            }
        }

        // --- 2. User Login ---
        window.loginUser = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if(!email || !password) {
                alert("Please enter Email and Password!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Logging in...";

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Fetch extra details from Firestore
                const docRef = doc(db, "students", user.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const userData = docSnap.data();
                    document.getElementById('welcomeMsg').innerText = "Welcome, " + userData.fullName + "!";
                } else {
                    document.getElementById('welcomeMsg').innerText = "Welcome, Student!";
                }

                toggleView('dashboardSection');
            } catch (error) {
                alert("Login Failed: Invalid Email or Password.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Log In";
            }
        }

        // --- 3. Forgot Password ---
        window.resetUserPassword = async function() {
            const email = document.getElementById('forgotEmail').value;
            if(!email) {
                alert("Please enter your email address.");
                return;
            }

            try {
                await sendPasswordResetEmail(auth, email);
                alert("A password reset link has been sent to " + email);
                toggleView('loginSection');
            } catch (error) {
                alert("Error: " + error.message);
            }
        }

        // --- 4. User Logout ---
        window.logoutUser = async function() {
            try {
                await signOut(auth);
                // Clear inputs
                document.querySelectorAll('input').forEach(input => input.value = '');
                toggleView('loginSection');
            } catch (error) {
                alert("Error logging out.");
            }
        }
    </script>
</body>
</html>
